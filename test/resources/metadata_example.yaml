description: |-
  ACCESS-ESM1.6 global coupled model configuration running with an interactive carbon cycle under pre-industrial forcings, branching from an esm-flat10 simulation. Pre-industrial forcing data are primarily sourced from the input4MIPs CMIP7 datasets.
